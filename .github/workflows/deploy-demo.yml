name: Deploy demo site

"on":
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZOLA_VERSION: 0.19.2
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Zola
        run: |
          curl -fsSL \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz
          sudo mv zola /usr/local/bin/zola
          zola --version

      - name: Compute GitHub Pages base URL
        id: pages
        env:
          OWNER: ${{ github.repository_owner }}
          REPOSITORY: ${{ github.event.repository.name }}
        run: |
          if [ "${REPOSITORY}" = "${OWNER}.github.io" ]; then
            BASE_URL="https://${OWNER}.github.io"
          else
            BASE_URL="https://${OWNER}.github.io/${REPOSITORY}"
          fi

          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "Using base URL: ${BASE_URL}"

      - name: Build theme demo
        run: |
          zola build \
            --base-url "${{ steps.pages.outputs.base_url }}" \
            --output-dir public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
